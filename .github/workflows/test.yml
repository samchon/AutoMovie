name: test
on:
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      # Matched by SHAPE, mirroring build.yml. The suite reads more than `src`:
      # the per-package lint ruleset `ttsc` enforces before a scenario runs, the
      # generators whose output it asserts, the guide corpus `prepare` bakes
      # into a pinned constant, and the scaffold `test_cli_scaffold` reads from
      # disk. None of those triggered a run before (#1333).
      - 'packages/*/src/**'
      - 'packages/*/*.json'
      - 'packages/*/*.ts'
      - 'packages/*/*.html'
      - 'packages/*/build/**'
      - 'packages/*/prompts/**'
      - 'packages/*/scaffold/**'
      - 'packages/*/scripts/**'
      - 'internals/config/**'
      - 'test/**'
      # Root tooling configuration, by shape (#1335). This list is deliberately
      # identical to build.yml's apart from the workflow filename above: the two
      # have now drifted once each, and keeping them character-identical is what
      # makes the next drift visible in review. GitHub cannot share a `paths:`
      # block between workflow files, so the alternative is one workflow with
      # two jobs, which would rename both required checks; not worth doing while
      # Actions cannot execute a step to confirm the rename.
      - '*.js'
      - '*.json'
      - '*.yaml'
      - '*.yml'
      - '.prettier*'
      - '.gitattributes'
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Install Dependencies
        run: pnpm install

      # The test program runs straight through ttsx (ttsc's tsgo runner, no
      # separate compile step). The coverage run executes every scenario and
      # fails if engine coverage drops below 100% on any metric.
      - name: Run Tests with 100% Coverage Gate
        run: pnpm coverage
        working-directory: test
