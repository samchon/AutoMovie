<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><title>autofilm — parametric head (MakeHuman base)</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font:12px/1.35 system-ui,sans-serif;color:#e6e9ef}
    #stage{display:grid;grid-template-columns:1fr 300px;height:100vh}
    #view{width:100%;height:100%;display:block;background:#1c2027}
    #panel{background:#14171c;border-left:1px solid #2a2f37;padding:10px 12px;overflow-y:auto}
    #panel h2{font-size:12px;margin:10px 0 4px;color:#aab3c5}
    .row{margin:5px 0}.row label{display:flex;justify-content:space-between}
    .row label .v{color:#9aa3b2;font-variant-numeric:tabular-nums}
    .row input[type=range]{width:100%;accent-color:#6f9dff}
    button{background:#222a36;color:#e6e9ef;border:1px solid #2a2f37;border-radius:4px;padding:3px 8px;margin:2px;cursor:pointer}
  </style></head>
  <body>
    <div id="stage">
      <canvas id="view"></canvas>
      <div id="panel">
        <h2>view</h2>
        <button data-cam="front">front</button><button data-cam="q34">3/4</button><button data-cam="side">side</button>
        <button id="bMat">normals</button><button id="bHair">hair</button><button id="bReset">reset</button>
        <h2>preset</h2>
        <select id="presetSel" style="width:100%;background:#0e1014;color:#e6e9ef;border:1px solid #2a2f37;border-radius:4px;padding:4px;margin-bottom:4px"></select>
        <button id="bDump">dump</button><button id="bApply">apply</button>
        <input id="preset" style="width:100%;background:#0e1014;color:#e6e9ef;border:1px solid #2a2f37;border-radius:4px;padding:3px;margin-top:4px" placeholder='{"eyeSize":0.5,...}' />
        <h2>parameters</h2><div id="params"></div>
      </div>
    </div>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      const canvas = document.getElementById("view");
      const gl = new THREE.WebGLRenderer({ canvas, antialias: true });
      const resize = () => { const w=canvas.clientWidth||1,h=canvas.clientHeight||1; gl.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix(); };
      const scene = new THREE.Scene(); scene.background = new THREE.Color(0x1c2027);
      const cam = new THREE.PerspectiveCamera(32, 1, 0.01, 200);
      // directional lights aim at the head (y≈7.3), not the origin
      const HEADC = new THREE.Vector3(0, 7.3, 0.6);
      const mkKey=(int,x,y,z)=>{ const L=new THREE.DirectionalLight(0xffffff,int); L.position.set(HEADC.x+x,HEADC.y+y,HEADC.z+z); L.target.position.copy(HEADC); scene.add(L); scene.add(L.target); return L; };
      // pure-form rig: even neutral light to read the SCULPTURE, no dramatic
      // key/rim "lighting effects" (the user judges form by math/ratios).
      mkKey(1.1, 0.3, 0.5, 1.0); mkKey(1.1, -0.3, 0.5, 1.0);
      mkKey(0.6, 0, 0.2, -1.0);
      scene.add(new THREE.AmbientLight(0xffffff,0.85));
      const controls = new OrbitControls(cam, canvas); controls.enableDamping = false;
      gl.setPixelRatio(1); resize(); addEventListener("resize", resize);

      const SKIN = 0xf2dccb, HAIR = 0x241c17;
      const clay = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.62, metalness:0, side:THREE.DoubleSide });
      const normalMat = new THREE.MeshNormalMaterial({ side:THREE.DoubleSide });
      let model, base, geo, mesh, hairMesh, hairDrape, eyeballs=[], params={}, values={}, hairOn=true, normalsOn=false;
      window.__ready = false;

      // smooth hair coverage weight (0..1) — feathered hairline, no jagged edge.
      // front (face, z>1.0): bare below forehead-top; back/sides: covered low.
      const smooth01 = (a,b,t) => { const u=Math.max(0,Math.min(1,(t-a)/(b-a))); return u*u*(3-2*u); };
      const hairWeight = (x,y,z) => {
        // hairline height rises SMOOTHLY toward the face (high z) so the forehead
        // is bare and the crown/sides/back are covered — no z-step → no jagged
        // temple edge. Sides (|x| large) also pulled down a little (sideburn).
        const line = 6.7 + 1.5*smooth01(0.2, 1.25, z);
        return smooth01(line-0.20, line+0.45, y);  // wide feather across the hairline
      };
      const hairCovered = (x,y,z) => hairWeight(x,y,z) > 0.5;

      function recompute() {
        const P = base.slice();
        for (const [name, v] of Object.entries(values)) {
          if (!v) continue; const side = v>0 ? params[name].plus : params[name].minus; const w = Math.abs(v);
          for (const [li,dx,dy,dz] of side) { P[li*3]+=dx*w; P[li*3+1]+=dy*w; P[li*3+2]+=dz*w; }
        }
        // no smoothing: the Catmull-Clark surface is already smooth and the
        // subdivided morphs are clean (the linear subdivision of real targets).
        geo.getAttribute("position").array.set(P);
        geo.getAttribute("position").needsUpdate = true;
        geo.computeVertexNormals();
        setColors(P); // re-bake concavity AO for the morphed surface
        if (hairMesh) rebuildHair(P);
        reseatEyes(P);
      }
      // each eyeball rigidly tracks the mean displacement of its socket-ring head
      // verts, so eye-region morphs (bridge/nose recession, eyeSize, …) move the
      // eyeball with the socket instead of leaving it stranded/popping.
      function reseatEyes(P){ if(!eyeballs.length||!eyeballs[0].anchor) return;
        for(const e of eyeballs){ let dx=0,dy=0,dz=0; const a=e.anchor; if(!a.length)continue;
          for(const i of a){ dx+=P[i*3]-base[i*3]; dy+=P[i*3+1]-base[i*3+1]; dz+=P[i*3+2]-base[i*3+2]; }
          // follow the socket, plus a small constant recess so the clay eye sits
          // just inside the lids (never proud → no bug-eye under any morph).
          e.mesh.position.set(dx/a.length, dy/a.length, dz/a.length - 0.035); } }
      let hairAdj = null;
      function rebuildHair(P) {
        // feathered offset along normal (volume grows with coverage), then a
        // couple of Laplacian smoothing passes for a soft, non-helmet shell.
        geo.computeVertexNormals(); const N = geo.getAttribute("normal").array;
        const hp = hairMesh.geometry.getAttribute("position").array;
        const n = P.length/3, T = 0.42;
        for (let i=0;i<n;i++){ const x=P[i*3],y=P[i*3+1],z=P[i*3+2];
          const w = hairWeight(x,y,z); const t = T*Math.sqrt(w); // feather
          hp[i*3]=x+N[i*3]*t; hp[i*3+1]=y+N[i*3+1]*t; hp[i*3+2]=z+N[i*3+2]*t; }
        // Laplacian smooth the hair shell (only the covered verts) — more passes
        // on the fine mesh for a soft continuous mass, not a patchy cap
        if (hairAdj) for (let pass=0;pass<14;pass++){ const src=hp.slice();
          for (const i of hairAdj.verts){ const nb=hairAdj.adj[i]; if(nb.length<2)continue;
            let ax=0,ay=0,az=0; for(const j of nb){ax+=src[j*3];ay+=src[j*3+1];az+=src[j*3+2];}
            const k=0.5/1; ax/=nb.length;ay/=nb.length;az/=nb.length;
            hp[i*3]+=k*(ax-hp[i*3]); hp[i*3+1]+=k*(ay-hp[i*3+1]); hp[i*3+2]+=k*(az-hp[i*3+2]); } }
        hairMesh.geometry.getAttribute("position").needsUpdate = true;
        hairMesh.geometry.computeVertexNormals();
      }
      // scalp shell DISABLED — the long-hair drape now covers the crown; the
      // shell only produced rolled artefacts at the ears. (Scalp vertex colour
      // in setColors still darkens the hairline under the part.)
      function hairFaceIndex() { hairAdj={verts:[],adj:{}}; return []; }
      function hairFaceIndex_unused() {
        const idx = model.indices, out = [], used=new Set();
        const w = (li)=>hairWeight(base[li*3],base[li*3+1],base[li*3+2]);
        for (let t=0;t<idx.length;t+=3){ const a=idx[t],b=idx[t+1],c=idx[t+2];
          if ((w(a)+w(b)+w(c))/3 > 0.20){ out.push(a,b,c); used.add(a);used.add(b);used.add(c); } }
        // adjacency over hair faces for smoothing
        const adj={}; for(const i of used)adj[i]=[];
        for(let t=0;t<out.length;t+=3){const tri=[out[t],out[t+1],out[t+2]];
          for(let e=0;e<3;e++){const x=tri[e],y=tri[(e+1)%3];if(!adj[x].includes(y))adj[x].push(y);if(!adj[y].includes(x))adj[y].push(x);}}
        hairAdj={verts:[...used],adj};
        return out;
      }
      // procedural long-hair drape: a smooth sculptural mass hanging from the
      // hairline down the back and sides (θ = around the head, s = down-length).
      // Front ~130° is left open for the face. Subtle vertical locks + a flare.
      function makeHairDrape(){
        const zc=0.5, headR=0.95;          // head vertical axis z, hair radius
        const Nth=84, Ns=50, row=Ns+1;
        const th0=-2.05, th1=2.05;          // ~±117° → ~126° face opening
        const crownY=8.35, partY=7.35, botY=4.2;
        const pos=[], idx=[];
        for(let i=0;i<=Nth;i++){ const th=th0+(th1-th0)*i/Nth;
          const sideT=Math.min(1,Math.abs(th)/2.05);          // 0 back … 1 front-sides
          const topY=crownY-(crownY-partY)*sideT;             // crown at back, lower at the front-sides (centre part)
          for(let j=0;j<=Ns;j++){ const s=j/Ns;
            const y=topY-s*(topY-botY);
            const grow=Math.min(1,s/0.18);                    // round over the crown in the first 18%
            const flare=1+0.16*Math.pow(Math.max(0,s-0.2),2); // gently widen toward the tip
            const r=headR*(0.32+0.68*grow)*flare;
            const x=r*Math.sin(th);
            const z=zc - r*Math.cos(th) - 0.4*s*s;             // θ=0 is the BACK; sweep back as it falls
            pos.push(x,y,z);
          }
        }
        // Laplacian smooth the interior grid → a soft continuous mass, no curls
        for(let pass=0;pass<4;pass++){ const src=pos.slice();
          for(let i=1;i<Nth;i++)for(let j=1;j<Ns;j++){ const a=(i*row+j)*3;
            for(let k=0;k<3;k++) pos[a+k]=0.4*src[a+k]+0.15*(src[a+k-3]+src[a+k+3]+src[a+k-row*3]+src[a+k+row*3]); } }
        for(let i=0;i<Nth;i++)for(let j=0;j<Ns;j++){ const a=i*row+j,b=a+row,c=a+1,d=b+1;
          idx.push(a,b,c, c,b,d); }
        const g=new THREE.BufferGeometry();
        g.setAttribute("position",new THREE.BufferAttribute(Float32Array.from(pos),3));
        g.setIndex(idx); g.computeVertexNormals();
        return new THREE.Mesh(g, new THREE.MeshStandardMaterial({color:HAIR,roughness:0.9,metalness:0,side:THREE.DoubleSide}));
      }
      // full-mesh 1-ring adjacency (built once; topology is fixed)
      let headAdj = null;
      function buildHeadAdj(){ const idx=model.indices, n=base.length/3;
        const sets=Array.from({length:n},()=>new Set());
        for(let t=0;t<idx.length;t+=3){const a=idx[t],b=idx[t+1],c=idx[t+2];
          sets[a].add(b);sets[a].add(c);sets[b].add(a);sets[b].add(c);sets[c].add(a);sets[c].add(b);}
        headAdj=sets.map(s=>[...s]);
      }
      const SKIN_L=new THREE.Color(SKIN).convertSRGBToLinear();
      const HAIR_L=new THREE.Color(HAIR).convertSRGBToLinear();
      const BROW_L=new THREE.Color(0x4a3526).convertSRGBToLinear();
      // brow-region vertex set (above each eye, front) — painted as eyebrows so
      // the face doesn't read as unfinished/browless.
      const LIP_L=new THREE.Color(0xb06f66).convertSRGBToLinear();
      let browVerts = null, lipVerts = null, lashVerts = null;
      function computeFeatureVerts(){
        const L=model.landmarks, lp=(k)=>[base[L[k]*3],base[L[k]*3+1],base[L[k]*3+2]];
        browVerts=new Set(); lipVerts=new Set(); lashVerts=new Set();
        // brows + lash line: per eye, above (brow) and at the upper rim (lash)
        for(const [inn,out] of [["innerEyeR","outerEyeR"],["innerEyeL","outerEyeL"]]){
          const a=lp(inn),b=lp(out); const ey=(a[1]+b[1])/2, ez=Math.max(a[2],b[2]);
          const xi=a[0], xo=b[0];
          const lo=Math.min(xi,xo)-0.012, hi=Math.max(xi,xo)+0.022;
          for(let i=0;i<base.length/3;i++){ const x=base[i*3],y=base[i*3+1],z=base[i*3+2];
            if(x<lo||x>hi||z<ez-0.06) continue;
            const t=Math.max(0,Math.min(1,(x-xi)/(xo-xi)));     // 0 inner .. 1 outer
            const browY=ey+0.085+0.032*Math.sin(t*Math.PI);     // gentle arch
            const thick=0.05-0.026*t;                            // thicker inner, taper to the tail
            if(Math.abs(y-browY)<thick) browVerts.add(i);        // arched, tapered brow
            else if(y>=ey+0.008&&y<ey+0.038) lashVerts.add(i);   // upper-lid lash line
          }
        }
        // lips: vermilion band around the mouth landmarks
        const mr=lp("mouthR"),ml=lp("mouthL"),up=lp("upperLip"),lo=lp("lowerLip");
        const cy=(mr[1]+ml[1]+up[1]+lo[1])/4, cz=Math.max(mr[2],ml[2]);
        const xlo=Math.min(mr[0],ml[0])-0.004, xhi=Math.max(mr[0],ml[0])+0.004;
        for(let i=0;i<base.length/3;i++){ const x=base[i*3],y=base[i*3+1],z=base[i*3+2];
          if(x>=xlo&&x<=xhi && y>=cy-0.05&&y<=cy+0.055 && z>=cz-0.02) lipVerts.add(i); }
      }
      // skin colour + geometry-driven concavity AO (valleys — eye sockets,
      // nasolabial, under-nose — darken so flat clay reads its depth; pure form,
      // no texture). Recomputed per morph from the current positions+normals.
      function setColors(P){
        P = P || base; const n = P.length/3;
        const col = geo.getAttribute("color") ? geo.getAttribute("color").array : new Float32Array(P.length);
        const N = geo.getAttribute("normal").array;
        // 1) concavity (valley) term per vertex from the Laplacian along normal
        const ao = new Float32Array(n).fill(1);
        if(headAdj) for(let i=0;i<n;i++){ const nb=headAdj[i]; if(!nb||nb.length<2)continue;
          let mx=0,my=0,mz=0; for(const j of nb){mx+=P[j*3];my+=P[j*3+1];mz+=P[j*3+2];}
          mx=mx/nb.length-P[i*3]; my=my/nb.length-P[i*3+1]; mz=mz/nb.length-P[i*3+2];
          const along=mx*N[i*3]+my*N[i*3+1]+mz*N[i*3+2];                       // >0 = concave valley
          ao[i]=Math.max(0.85, 1-7*Math.max(0,along)); }
        // 2) smooth the AO field over the 1-ring → gentle form shading, no
        // tessellation blotches/smears (pure form, not a dirty texture)
        if(headAdj) for(let pass=0;pass<2;pass++){ const src=ao.slice();
          for(let i=0;i<n;i++){ const nb=headAdj[i]; if(!nb||nb.length<1)continue;
            let s=src[i]; for(const j of nb)s+=src[j]; ao[i]=s/(nb.length+1); } }
        // 3) apply: skin/hair base colour × smoothed AO
        for(let i=0;i<n;i++){ const hair=hairOn && hairCovered(P[i*3],P[i*3+1],P[i*3+2]);
          const c=hair?HAIR_L:SKIN_L, a=hair?1:ao[i];
          col[i*3]=c.r*a; col[i*3+1]=c.g*a; col[i*3+2]=c.b*a; }
        if(!geo.getAttribute("color")) geo.setAttribute("color", new THREE.BufferAttribute(col,3));
        else geo.getAttribute("color").needsUpdate=true;
      }

      fetch("/models/head-model.json").then(r=>r.json()).then(m=>{
        model=m; params=m.params; base=Float32Array.from(m.positions);
        for (const k of Object.keys(params)) values[k]=0;
        geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(Float32Array.from(m.positions),3));
        geo.setIndex(m.indices); geo.computeVertexNormals(); buildHeadAdj(); computeFeatureVerts(); setColors();
        mesh = new THREE.Mesh(geo, clay); scene.add(mesh);
        // hair shell: ONLY hair-region faces (offset outward), dark material
        const hgeo = new THREE.BufferGeometry();
        hgeo.setAttribute("position", new THREE.BufferAttribute(Float32Array.from(m.positions),3));
        hgeo.setIndex(hairFaceIndex());
        const hairColMat = new THREE.MeshStandardMaterial({ color:HAIR, roughness:0.85, metalness:0, side:THREE.DoubleSide });
        hairMesh = new THREE.Mesh(hgeo, hairColMat); scene.add(hairMesh);
        rebuildHair(base);
        // long-hair drape: a sculptural hair MASS (Roman-bust style — smooth
        // carved locks, not strands) draping from the hairline down the back and
        // sides past the shoulders, so the silhouette matches the long-haired
        // references. Procedural surface grid (θ around the back, s down-length).
        hairDrape = makeHairDrape(); scene.add(hairDrape);
        // NATIVE eyeballs: the MakeHuman eye helpers at their actual macro'd
        // socket positions (no custom reseating). The eyelids of the head mesh
        // frame them — this is how MakeHuman gets a real open eye.
        eyeballs = [];
        const mkEyeball = (e) => {
          const g = new THREE.BufferGeometry();
          g.setAttribute("position", new THREE.BufferAttribute(Float32Array.from(e.positions),3));
          g.setIndex(e.indices); g.computeVertexNormals();
          // iris + pupil + sclera (Roman busts carved/drilled these — pure FORM,
          // not a flat texture). Colour the eyeball radially from its forward gaze:
          // pupil (dark) → iris (brown) → sclera (off-white), so the eye READS.
          const ep=e.positions, n=ep.length/3; let cx=0,cy=0,cz=0; for(let i=0;i<n;i++){cx+=ep[i*3];cy+=ep[i*3+1];cz+=ep[i*3+2];} cx/=n;cy/=n;cz/=n;
          let fi=0,fz=-1e9; for(let i=0;i<n;i++){ if(ep[i*3+2]>fz){fz=ep[i*3+2];fi=i;} }   // cornea apex = forward gaze
          let gx=ep[fi*3]-cx,gy=ep[fi*3+1]-cy,gz=ep[fi*3+2]-cz; const gl=Math.hypot(gx,gy,gz)||1; gx/=gl;gy/=gl;gz/=gl;
          const col=new Float32Array(n*3); const SC=[0.91,0.88,0.83],IR=[0.30,0.20,0.12],PU=[0.05,0.04,0.03];
          for(let i=0;i<n;i++){ let vx=ep[i*3]-cx,vy=ep[i*3+1]-cy,vz=ep[i*3+2]-cz; const vl=Math.hypot(vx,vy,vz)||1; const c=(vx*gx+vy*gy+vz*gz)/vl;
            const C = c>0.975?PU : c>0.88?IR : SC; col[i*3]=C[0];col[i*3+1]=C[1];col[i*3+2]=C[2]; }
          g.setAttribute("color", new THREE.BufferAttribute(col,3));
          const mesh = new THREE.Mesh(g, new THREE.MeshStandardMaterial({vertexColors:true, roughness:0.35, metalness:0, side:THREE.DoubleSide}));
          scene.add(mesh);
          // anchor the eyeball to its SOCKET: the head verts ringing the eye. On
          // every morph the eyeball rigidly follows their mean displacement, so
          // recessing the bridge/nose (or any eye-region morph) never pops the
          // fixed eyeball out of its socket.
          const np=n;   // eye centre (cx,cy,cz) already computed above for the iris
          let r2=0; for(let i=0;i<np;i++){ r2=Math.max(r2,(e.positions[i*3]-cx)**2+(e.positions[i*3+1]-cy)**2+(e.positions[i*3+2]-cz)**2); }
          const R2=r2*2.2; const anchor=[]; const nv=base.length/3;
          for(let i=0;i<nv;i++){ const d=(base[i*3]-cx)**2+(base[i*3+1]-cy)**2+(base[i*3+2]-cz)**2; if(d<R2) anchor.push(i); }
          eyeballs.push({ mesh, anchor });
        };
        if (m.eyeR) mkEyeball(m.eyeR);
        if (m.eyeL) mkEyeball(m.eyeL);
        // frame
        geo.computeBoundingBox(); const bb=geo.boundingBox; const c=bb.getCenter(new THREE.Vector3());
        window.__center=[c.x,c.y,c.z]; window.__box={min:bb.min.toArray(),max:bb.max.toArray()};
        camFront(); buildSliders();
        // preset dropdown (neutral + hero1/2/3 + beauty), baked into the model
        const psel = document.getElementById("presetSel");
        for (const name of Object.keys(model.presets || { neutral: {} })) {
          const o = document.createElement("option"); o.value = name; o.textContent = name; psel.appendChild(o);
        }
        psel.addEventListener("change", () => window.__setParams(model.presets[psel.value] || {}));
        window.__ready = true;
      });

      const sliderEls = {};
      function buildSliders(){ const host=document.getElementById("params");
        const groups = model.groups || { all: Object.keys(params) };
        for (const [region, names] of Object.entries(groups)){
          const h=document.createElement("h2"); h.textContent=region; host.appendChild(h);
          for (const name of names){ if(!params[name]) continue;
            const row=document.createElement("div"); row.className="row";
            row.innerHTML=`<label><span>${name}</span><span class="v">0.00</span></label><input type="range" min="-1.5" max="1.5" step="0.05" value="0">`;
            const inp=row.querySelector("input"), out=row.querySelector(".v");
            inp.addEventListener("input",()=>{ values[name]=+inp.value; out.textContent=(+inp.value).toFixed(2); recompute(); });
            sliderEls[name]={inp,out}; host.appendChild(row); }
        }
      }
      function syncSliders(){ for (const [name,{inp,out}] of Object.entries(sliderEls)){ inp.value=values[name]||0; out.textContent=(values[name]||0).toFixed(2); } }
      const camAt=(px,py,pz)=>{ const c=window.__center; cam.position.set(c[0]+px,c[1]+py,c[2]+pz); controls.target.set(...c); controls.update(); };
      const D=()=>{ const b=window.__box; return (b.max[1]-b.min[1])*1.7; };
      const camFront=()=>camAt(0,0,D()), camQ=()=>camAt(D()*0.6,D()*0.04,D()*0.8), camS=()=>camAt(D()*0.98,0,D()*0.12);
      document.querySelectorAll("[data-cam]").forEach(b=>b.addEventListener("click",()=>({front:camFront,q34:camQ,side:camS})[b.dataset.cam]()));
      document.getElementById("bMat").onclick=()=>{ normalsOn=!normalsOn; mesh.material=normalsOn?normalMat:clay; if(hairMesh)hairMesh.visible=!normalsOn&&hairOn; if(hairDrape)hairDrape.visible=!normalsOn&&hairOn; };
      document.getElementById("bHair").onclick=()=>{ hairOn=!hairOn; hairMesh.visible=hairOn; if(hairDrape)hairDrape.visible=hairOn; };
      document.getElementById("bReset").onclick=()=>{ for(const k of Object.keys(values))values[k]=0; syncSliders(); recompute(); };
      document.getElementById("bDump").onclick=()=>{ const o={}; for(const[k,v]of Object.entries(values))if(v)o[k]=+v.toFixed(2); document.getElementById("preset").value=JSON.stringify(o); };
      document.getElementById("bApply").onclick=()=>{ try{ window.__setParams(JSON.parse(document.getElementById("preset").value||"{}")); }catch(e){ alert("bad JSON"); } };

      // headless hooks
      window.__setParam=(name,v)=>{ values[name]=v; if(sliderEls[name]){sliderEls[name].inp.value=v;sliderEls[name].out.textContent=v.toFixed(2);} recompute(); };
      window.__setParams=(obj)=>{ for(const k of Object.keys(values))values[k]=0; for(const[k,v]of Object.entries(obj))values[k]=v; if(Object.keys(sliderEls).length)syncSliders(); recompute(); };
      // consume an IAutoFilmHead nested document (the LLM tool-calling schema) —
      // same projection as engine.flattenHead (the canonical, tested version).
      const HEAD_MAP={shape:{width:"faceWidth",length:"faceLength",oval:"faceOval",round:"headRound",foreheadSlope:"foreheadSlope",foreheadHeight:"foreheadHeight",foreheadBulge:"foreheadBulge",templeWidth:"templeWidth",occiputDepth:"occiputDepth"},brow:{height:"browHeight",angle:"browAngle"},eyes:{size:"eyeSize",openness:"eyeHeight",spacing:"eyeSpacing",tilt:"eyeAngle",depth:"eyeDepth",epicanthus:"epicanthus",fold:"eyeFold"},nose:{width:"noseWidth",length:"noseLength",projection:"noseProject",hump:"noseHump",tipAngle:"nosePoint",nostrilWidth:"nostrilWidth",baseHeight:"noseBaseH",bridge:"noseBridge"},mouth:{width:"mouthWidth",lipFullness:"lipFull",upperLipHeight:"upperLipH",lowerLipHeight:"lowerLipH",cupidsBow:"cupidsBow",philtrum:"philtrum",height:"mouthHeight",smile:"mouthSmile"},cheek:{fullness:"cheekFull",bones:"cheekBones"},jaw:{width:"jawWidth",drop:"jawDrop",chinLength:"chinLength",chinWidth:"chinWidth",chinProjection:"chinProject"}};
      window.__setHead=(doc)=>{ const flat={}; for(const g in HEAD_MAP){ const grp=doc[g]; if(!grp)continue; for(const f in HEAD_MAP[g]) if(grp[f]!==undefined) flat[HEAD_MAP[g][f]]=grp[f]; } window.__setParams(flat); };
      window.__camObj=cam;
      window.__resize=(w,h)=>{ const p=document.getElementById("panel"); if(p)p.style.display="none";
        canvas.style.position="fixed"; canvas.style.inset="0"; canvas.style.width=w+"px"; canvas.style.height=h+"px"; canvas.style.zIndex="9999";
        gl.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix(); };
      window.__cam=(px,py,pz,tx,ty,tz)=>{ cam.position.set(px,py,pz); controls.target.set(tx,ty,tz); cam.lookAt(tx,ty,tz); cam.updateProjectionMatrix(); };
      window.__mat=(mode)=>{ normalsOn=mode==="normal"; mesh.material=normalsOn?normalMat:clay; if(hairMesh)hairMesh.visible=!normalsOn&&hairOn; if(hairDrape)hairDrape.visible=!normalsOn&&hairOn; };
      window.__hair=(on)=>{ hairOn=on; hairMesh.visible=on; if(hairDrape)hairDrape.visible=on; setColors(geo.getAttribute("position").array); };
      window.__probe=()=>{ const A=geo.getAttribute("position").array, L=model.landmarks;
        const g=(k)=>[+A[L[k]*3].toFixed(4),+A[L[k]*3+1].toFixed(4),+A[L[k]*3+2].toFixed(4)];
        return { values:{...values}, outerEyeR:g("outerEyeR"), innerEyeR:g("innerEyeR"), mouthR:g("mouthR"), lowerLip:g("lowerLip"), chinFront:g("chinFront") }; };
      const tick=()=>{ controls.update(); gl.render(scene,cam); requestAnimationFrame(tick); }; tick();
    </script>
  </body>
</html>
