<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>autofilm face editor</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

      const DATA_URL = "/models/head-model.json";
      const MODEL_ROOT = "/@fs/D:/github/samchon/motica/.models/hero";
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const mix = (a, b, t) => a + (b - a) * t;
      const smooth = (x) => {
        const t = clamp(x, 0, 1);
        return t * t * (3 - 2 * t);
      };
      const gaussian = (x, center, width) => {
        const d = (x - center) / width;
        return Math.exp(-d * d);
      };
      const pretty = (text) =>
        text.replace(/([A-Z])/g, " $1").replace(/^./, (s) => s.toUpperCase());
      const viewCamera = {
        front: [0, 0.03, 5.4],
        frontClose: [0, 0.02, 3.65],
        rightThreeQuarter: [3.3, 0.03, 4.2],
        rightThreeQuarterClose: [2.35, 0.03, 3.35],
        rightProfile: [5.4, 0.03, 0],
        rightProfileClose: [3.65, 0.03, 0],
        rightSocketClose: [2.1, 0.5, 2.65],
        top: [0, 5.6, 0.01],
        bottom: [0, -5.6, 0.01],
        back: [0, 0.03, -5.4],
        backRightThreeQuarter: [2.75, 0.03, -3.35],
        backLeftThreeQuarter: [-2.75, 0.03, -3.35],
        leftThreeQuarter: [-3.3, 0.03, 4.2],
        leftThreeQuarterClose: [-2.35, 0.03, 3.35],
        leftSocketClose: [-2.1, 0.5, 2.65],
        leftProfile: [-5.4, 0.03, 0],
        leftProfileClose: [-3.65, 0.03, 0],
        eyeClose: [0, 0.11, 2.25],
      };
      const baselineMetrics = {
        facialIndex: 1.36,
        jawToZygoma: 0.69,
        chinToZygoma: 0.36,
        eyeWidthToFace: 0.22,
        eyeAperture: 0.32,
        eyeSpacingToWidth: 1.08,
        browEyeDistance: 0.88,
        noseWidthToFace: 0.225,
        noseLengthToFace: 0.315,
        mouthWidthToFace: 0.345,
        lowerUpperLip: 1.18,
        chinHeightToFace: 0.18,
        profileDepthToFace: 0.72,
        tipProjectionToFace: 0.18,
      };

      const app = document.querySelector("#app");
      app.innerHTML = `
        <style>
          * { box-sizing: border-box; }
          html, body, #app { width: 100%; height: 100%; }
          body {
            margin: 0;
            font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #dfe4ec;
            background: #101216;
          }
          button, select, input { font: inherit; }
          #stage {
            display: grid;
            grid-template-columns: minmax(520px, 1fr) 390px;
            height: 100vh;
            min-height: 620px;
          }
          #workbench {
            display: grid;
            grid-template-rows: minmax(0, 1fr) 190px;
            min-width: 0;
            background: #151922;
          }
          #viewport {
            position: relative;
            min-width: 0;
            min-height: 0;
          }
          #view {
            width: 100%;
            height: 100%;
            display: block;
            background: #171b23;
          }
          #reference {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            background-size: contain;
          }
          #hud {
            position: absolute;
            left: 14px;
            top: 14px;
            display: grid;
            gap: 8px;
            width: min(560px, calc(100% - 28px));
          }
          .hud-line {
            width: fit-content;
            max-width: 100%;
            padding: 6px 8px;
            border: 1px solid rgba(220, 226, 235, 0.18);
            border-radius: 6px;
            background: rgba(15, 17, 22, 0.74);
            color: #dbe2ed;
            font-size: 11px;
            backdrop-filter: blur(8px);
          }
          #strip {
            display: grid;
            grid-template-columns: repeat(5, minmax(112px, 1fr));
            gap: 6px;
            padding: 8px;
            border-top: 1px solid #2b303a;
            background: #101216;
            overflow: hidden;
          }
          .thumb {
            position: relative;
            min-width: 0;
            border: 1px solid #2b303a;
            border-radius: 6px;
            overflow: hidden;
            background: #0d0f13;
            cursor: pointer;
          }
          .thumb.active { border-color: #c99a56; }
          .thumb .crop {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
          }
          .thumb span {
            position: absolute;
            left: 6px;
            bottom: 5px;
            padding: 2px 5px;
            border-radius: 4px;
            background: rgba(8, 9, 12, 0.76);
            color: #f2f4f7;
            font-size: 10px;
          }
          #panel {
            min-width: 0;
            overflow-y: auto;
            border-left: 1px solid #2b303a;
            background: #12151b;
          }
          #panelHeader {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 14px;
            border-bottom: 1px solid #2b303a;
            background: rgba(18, 21, 27, 0.96);
          }
          h1 {
            margin: 0 0 3px;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: 0;
          }
          .sub {
            color: #9aa4b5;
            font-size: 11px;
          }
          #panelBody {
            padding: 12px 14px 20px;
          }
          h2 {
            margin: 15px 0 8px;
            color: #aab4c5;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
          }
          .toolbar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
          }
          button, select {
            min-height: 30px;
            border: 1px solid #303744;
            border-radius: 6px;
            background: #1b202a;
            color: #e7ebf2;
          }
          button {
            cursor: pointer;
          }
          button.active {
            border-color: #c99a56;
            background: #2a2218;
            color: #ffe2b8;
          }
          select {
            width: 100%;
            padding: 4px 7px;
          }
          .row {
            margin: 8px 0;
          }
          .row label {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
          }
          .row label span:first-child {
            overflow-wrap: anywhere;
          }
          .value {
            color: #abb6c8;
            font-variant-numeric: tabular-nums;
          }
          input[type="range"] {
            width: 100%;
            accent-color: #c99a56;
          }
          #metrics {
            display: grid;
            gap: 4px;
          }
          .metric {
            display: grid;
            grid-template-columns: minmax(92px, 1fr) 56px 56px 56px;
            gap: 6px;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #222832;
            font-variant-numeric: tabular-nums;
          }
          .metric.header {
            color: #8f9bad;
            font-size: 10px;
            text-transform: uppercase;
          }
          .metric .err.ok { color: #8fd69c; }
          .metric .err.warn { color: #f3c46f; }
          .metric .err.bad { color: #f08b81; }
          #paramGroups details {
            border-top: 1px solid #242a35;
            padding-top: 7px;
          }
          #paramGroups summary {
            cursor: pointer;
            color: #c3cad6;
            font-weight: 650;
          }
          #cycleLog {
            min-height: 76px;
            padding: 8px;
            border: 1px solid #29303b;
            border-radius: 6px;
            background: #0e1116;
            color: #aab4c5;
            white-space: pre-wrap;
          }
          @media (max-width: 900px) {
            #stage { grid-template-columns: 1fr; grid-template-rows: 60vh auto; height: auto; min-height: 100vh; }
            #workbench { grid-template-rows: minmax(360px, 60vh) 150px; }
            #panel { border-left: 0; border-top: 1px solid #2b303a; }
          }
        </style>
        <div id="stage">
          <main id="workbench">
            <section id="viewport">
              <canvas id="view"></canvas>
              <div id="reference"></div>
              <div id="hud">
                <div class="hud-line" id="cycleStatus">Change one parameter, measure, analyze, adjust. No unmeasured completion claim.</div>
                <div class="hud-line" id="viewStatus">front · render only</div>
              </div>
            </section>
            <section id="strip"></section>
          </main>
          <aside id="panel">
            <div id="panelHeader">
              <h1>Face Editor</h1>
              <div class="sub">Universal parameters. Heroes are numeric presets.</div>
            </div>
            <div id="panelBody">
              <h2>Preset</h2>
              <select id="preset"></select>
              <h2>View</h2>
              <div class="toolbar" id="views"></div>
              <h2>Reference</h2>
              <div class="row">
                <label><span>hero sheet</span><span class="value" id="heroLabel">off</span></label>
                <select id="hero"></select>
              </div>
              <div class="row">
                <label><span>overlay opacity</span><span class="value" id="overlayValue">0.00</span></label>
                <input id="overlayOpacity" type="range" min="0" max="1" step="0.01" value="0" />
              </div>
              <h2>Measurement</h2>
              <div id="metrics"></div>
              <h2>Adjustment Cycle</h2>
              <div id="cycleLog"></div>
              <h2>Parameters</h2>
              <div id="paramGroups"></div>
            </div>
          </aside>
        </div>
      `;

      const canvas = document.querySelector("#view");
      const reference = document.querySelector("#reference");
      const presetSelect = document.querySelector("#preset");
      const heroSelect = document.querySelector("#hero");
      const overlayOpacity = document.querySelector("#overlayOpacity");
      const overlayValue = document.querySelector("#overlayValue");
      const heroLabel = document.querySelector("#heroLabel");
      const metricsEl = document.querySelector("#metrics");
      const paramGroupsEl = document.querySelector("#paramGroups");
      const strip = document.querySelector("#strip");
      const viewButtons = document.querySelector("#views");
      const cycleLog = document.querySelector("#cycleLog");
      const cycleStatus = document.querySelector("#cycleStatus");
      const viewStatus = document.querySelector("#viewStatus");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x171b23);
      scene.add(new THREE.HemisphereLight(0xdfe6f2, 0x252a33, 0.82));
      const key = new THREE.DirectionalLight(0xfff4e0, 1.05);
      key.position.set(1.4, 1.7, 2.4);
      scene.add(key);
      const side = new THREE.DirectionalLight(0xcdd9ff, 0.42);
      side.position.set(-2.2, 0.7, 1.2);
      scene.add(side);
      const rim = new THREE.DirectionalLight(0xffffff, 0.34);
      rim.position.set(-1.4, 1.5, -2.0);
      scene.add(rim);

      const camera = new THREE.PerspectiveCamera(24, 1, 0.05, 20);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      const controls = new OrbitControls(camera, canvas);
      controls.target.set(0, 0.02, 0);
      controls.enableDamping = true;

      const root = new THREE.Group();
      scene.add(root);
      const clay = new THREE.MeshStandardMaterial({
        color: 0xd8b7a3,
        roughness: 0.78,
        metalness: 0,
      });
      const featureMat = new THREE.MeshStandardMaterial({
        color: 0x9f6a66,
        roughness: 0.8,
        metalness: 0,
      });
      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf0ece6, roughness: 0.55 });
      const irisMat = new THREE.MeshStandardMaterial({ color: 0x3b2920, roughness: 0.35 });
      const browMat = new THREE.MeshStandardMaterial({ color: 0x251d19, roughness: 0.88 });
      const metricMat = new THREE.LineBasicMaterial({ color: 0xf3c46f, transparent: true, opacity: 0.7 });
      const managedMaterials = new Set([clay, featureMat, whiteMat, irisMat, browMat, metricMat]);
      let cutawayPlanes = [];
      const applyCutawayToMaterial = (material) => {
        material.clippingPlanes = cutawayPlanes;
        material.clipIntersection = false;
        material.needsUpdate = true;
      };
      const setCutawayPlanes = (planes) => {
        cutawayPlanes = planes;
        renderer.localClippingEnabled = planes.length > 0;
        for (const material of managedMaterials) applyCutawayToMaterial(material);
      };
      const registerMaterial = (material) => {
        managedMaterials.add(material);
        applyCutawayToMaterial(material);
        return material;
      };
      setCutawayPlanes([]);

      const headGeometry = new THREE.BufferGeometry();
      const headMesh = new THREE.Mesh(headGeometry, clay);
      headMesh.castShadow = true;
      headMesh.receiveShadow = true;
      root.add(headMesh);
      const metricsGroup = new THREE.Group();
      root.add(metricsGroup);
      const featureGroup = new THREE.Group();
      root.add(featureGroup);

      const state = {
        data: null,
        values: {},
        preset: "neutral",
        hero: "",
        view: "front",
        overlay: 0,
        lastChanged: null,
        metrics: {},
        basePositions: null,
        currentPositions: null,
        cutaway: "none",
      };

      const get = (id) => Number(state.values[id] ?? 0);
      const get01 = (id, scale = 1) => clamp(get(id) / scale, -1, 1);
      const assignPreset = (name) => {
        state.preset = name;
        state.values = {};
        const preset = state.data.presets[name];
        for (const p of state.data.parameters) state.values[p.id] = p.default ?? 0;
        for (const [id, value] of Object.entries(preset.values ?? {})) state.values[id] = value;
        state.hero = name.startsWith("hero") ? name : "";
        presetSelect.value = name;
        heroSelect.value = state.hero;
        heroLabel.textContent = state.hero || "off";
        updateReference();
        refreshSliders();
        rebuild();
      };
      const readParameters = () => {
        const p = {};
        for (const item of state.data.parameters) p[item.id] = get(item.id);
        return {
          p,
          cranialW: 1 + get("headWidth") * 0.055 + get("cephalicIndex") * 0.035,
          cranialH: 1 + get("headHeight") * 0.05 + get("foreheadHeight") * 0.025,
          cranialD: 1 + get("headDepth") * 0.07 - get("cephalicIndex") * 0.03,
          faceLen: 1 + get("faceLength") * 0.07,
          zygomaW: 1 + get("bizygomaticWidth") * 0.055,
          jawW: 1 + get("jawWidth") * 0.07 - get("jawTaper") * 0.04,
          chinW: 1 + get("chinWidth") * 0.08 - get("jawTaper") * 0.04,
          eyeScale: 1 + get("eyeScale") * 0.07,
          eyeWidth: 1 + get("eyeWidth") * 0.1 + get("eyeScale") * 0.035,
          eyeHeight: 1 + get("eyeHeight") * 0.14 + get("eyeScale") * 0.025,
          eyeSpacing: get("eyeSpacing") * 0.028,
          noseW: 1 + get("alarWidth") * 0.09 + get("tipWidth") * 0.025,
          noseLen: 1 + get("noseLength") * 0.08,
          mouthW: 1 + get("mouthWidth") * 0.12,
          upperLip: 1 + get("upperLipHeight") * 0.15 + get("upperLipFullness") * 0.05,
          lowerLip: 1 + get("lowerLipHeight") * 0.15 + get("lowerLipFullness") * 0.05,
        };
      };
      const headPoint = (u, v, c) => {
        const phi = u * Math.PI * 2;
        const y = Math.cos(v * Math.PI);
        const ring = Math.sin(v * Math.PI);
        const front = Math.cos(phi);
        const side = Math.sin(phi);
        const isFront = Math.max(0, front);
        const lower = smooth((-y + 0.12) / 0.76);
        const upper = smooth((y + 0.1) / 0.78);
        const mid = gaussian(y, 0.0, 0.52);
        const jawBand = gaussian(y, -0.5, 0.22);
        const chinBand = gaussian(y, -0.78, 0.18);
        const cheekBand = gaussian(y, -0.05 - get("cheekboneHeight") * 0.025, 0.22);
        const templeBand = gaussian(y, 0.28, 0.26);
        let halfW =
          0.47 *
          ring *
          c.cranialW *
          (1 + get("templeWidth") * 0.035 * templeBand + get("cheekFullness") * 0.028 * cheekBand);
        halfW *=
          1 +
          isFront * cheekBand * (c.zygomaW - 1 + get("cheekboneProjection") * 0.02) +
          isFront * jawBand * (c.jawW - 1) +
          isFront * chinBand * (c.chinW - 1);
        const chinTuck = isFront * chinBand * (0.08 + get("chinRoundness") * 0.02);
        const yFace = y * 0.78 * c.cranialH * (1 + (lower - 0.4) * (c.faceLen - 1));
        let z =
          front *
          0.45 *
          ring *
          c.cranialD *
          (1 + get("occiputDepth") * 0.03 * Math.max(0, -front) + get("foreheadBulge") * 0.025 * upper);
        z += isFront * (0.076 * mid + get("cheekFullness") * 0.022 * cheekBand);
        z += isFront * get("chinProjection") * 0.036 * chinBand;
        z -= isFront * get("jawAngle") * 0.018 * jawBand;
        z += isFront * get("foreheadSlope") * 0.03 * upper * (0.3 + y);
        return new THREE.Vector3(side * halfW * (1 - chinTuck), yFace - 0.03, z);
      };
      const ensureHeadMesh = () => {
        if (state.basePositions !== null) return;
        state.basePositions = new Float32Array(state.data.mesh.positions);
        state.currentPositions = new Float32Array(state.basePositions.length);
        headGeometry.setIndex(state.data.mesh.indices);
        headGeometry.setAttribute(
          "position",
          new THREE.BufferAttribute(state.currentPositions, 3),
        );
      };
      const collectBounds = (positions, predicate) => {
        const bounds = {
          min: [Infinity, Infinity, Infinity],
          max: [-Infinity, -Infinity, -Infinity],
          count: 0,
        };
        for (let i = 0; i < positions.length; i += 3) {
          const x = positions[i];
          const y = positions[i + 1];
          const z = positions[i + 2];
          if (!predicate(x, y, z)) continue;
          bounds.count += 1;
          bounds.min[0] = Math.min(bounds.min[0], x);
          bounds.min[1] = Math.min(bounds.min[1], y);
          bounds.min[2] = Math.min(bounds.min[2], z);
          bounds.max[0] = Math.max(bounds.max[0], x);
          bounds.max[1] = Math.max(bounds.max[1], y);
          bounds.max[2] = Math.max(bounds.max[2], z);
        }
        return bounds;
      };
      const range = (bounds, axis) => bounds.max[axis] - bounds.min[axis];
      const applySparseMorph = (positions, rows, weight) => {
        for (const [index, dx, dy, dz] of rows ?? []) {
          const i = index * 3;
          positions[i] += dx * weight;
          positions[i + 1] += dy * weight;
          positions[i + 2] += dz * weight;
        }
      };
      const applyOrbitalSculpt = (positions, facts) => {
        const groups = state.data.featureGroups ?? {};
        const eyeX = Math.max(0.001, facts.faceWidth * 0.176);
        const eyeY = facts.eyeY + facts.faceBottom;
        const eyeBandY = Math.max(0.001, facts.faceHeight * 0.11);
        const eyeBandX = Math.max(0.001, facts.faceWidth * 0.125);
        const frontCut = facts.faceBottom + facts.faceHeight * 0.5;
        const depth = Math.max(0.001, facts.profileDepth);
        const socketDepth = 0.03 + get("eyeDepth") * 0.02 + get("eyeScale") * 0.01;
        const browLift = 0.005 + get("browHeight") * 0.006;
        const pushGroup = (indices, scale, lift = 0) => {
          for (const index of indices ?? []) {
            const i = index * 3;
            positions[i + 2] -= scale;
            positions[i + 1] += lift;
          }
        };
        pushGroup(groups.eyeTargetLeft, socketDepth * 0.8, browLift * 0.05);
        pushGroup(groups.eyeTargetRight, socketDepth * 0.8, browLift * 0.05);
        pushGroup(groups.upperLidLeft, socketDepth * 0.45, browLift * 0.08);
        pushGroup(groups.upperLidRight, socketDepth * 0.45, browLift * 0.08);
        pushGroup(groups.lowerLidLeft, socketDepth * 0.3, -socketDepth * 0.02);
        pushGroup(groups.lowerLidRight, socketDepth * 0.3, -socketDepth * 0.02);
        pushGroup(groups.eyeLeft, socketDepth * 0.22);
        pushGroup(groups.eyeRight, socketDepth * 0.22);
        for (let i = 0; i < positions.length; i += 3) {
          const x = positions[i];
          const y = positions[i + 1];
          const z = positions[i + 2];
          if (z < frontCut) continue;
          const left = gaussian(x, -eyeX, eyeBandX) * gaussian(y, eyeY, eyeBandY);
          const right = gaussian(x, eyeX, eyeBandX) * gaussian(y, eyeY, eyeBandY);
          const orbit = Math.max(left, right);
          if (orbit <= 0.0001) continue;
          const upper = gaussian(y, eyeY + eyeBandY * 0.8, eyeBandY * 0.55);
          const lower = gaussian(y, eyeY - eyeBandY * 0.55, eyeBandY * 0.6);
          positions[i + 2] -= orbit * socketDepth * (0.92 + 0.42 * upper) * (depth * 1.08);
          positions[i + 1] += orbit * browLift * upper;
          positions[i + 1] -= orbit * socketDepth * 0.24 * lower;
        }
      };
      const deriveFactsFromPositions = (positions) => {
        const all = collectBounds(positions, () => true);
        const width = range(all, 0);
        const height = range(all, 1);
        const depth = range(all, 2);
        const frontCut = all.min[2] + depth * 0.58;
        const front = collectBounds(
          positions,
          (x, y, z) =>
            z > frontCut &&
            y > all.min[1] + height * 0.18 &&
            y < all.max[1] - height * 0.08 &&
            Math.abs(x) < width * 0.28,
        );
        const usable = front.count > 30 ? front : all;
        const faceTop = usable.max[1];
        const faceBottom = usable.min[1];
        const faceHeight = Math.max(0.001, faceTop - faceBottom);
        const band = (from, to, zCut = frontCut) =>
          collectBounds(
            positions,
            (x, y, z) =>
              z > zCut &&
              y > faceBottom + faceHeight * from &&
              y < faceBottom + faceHeight * to &&
              Math.abs(x) < width * 0.34,
          );
        const cheek = band(0.5, 0.76, all.min[2] + depth * 0.48);
        const jaw = band(0.22, 0.42, all.min[2] + depth * 0.44);
        const chin = band(0.06, 0.2, all.min[2] + depth * 0.44);
        const nose = band(0.42, 0.62, all.min[2] + depth * 0.64);
        const faceWidth = Math.max(0.001, range(cheek.count > 10 ? cheek : usable, 0));
        const jawWidth =
          faceWidth *
          (0.69 + get("jawWidth") * 0.06 - get("jawTaper") * 0.045);
        const chinWidth =
          faceWidth *
          (0.36 + get("chinWidth") * 0.045 - get("jawTaper") * 0.025);
        const noseWidth =
          faceWidth *
          (0.225 + get("alarWidth") * 0.03 + get("tipWidth") * 0.012);
        const eyeWidth =
          faceWidth *
          (0.22 + get("eyeScale") * 0.012 + get("eyeWidth") * 0.018);
        const eyeHeight =
          eyeWidth * (0.32 + get("eyeHeight") * 0.035 + get("eyeScale") * 0.006);
        const eyeSpacing = eyeWidth * (1.08 + get("eyeSpacing") * 0.16);

      const renderStrip = () => {
        strip.innerHTML = "";
        if (!state.hero) return;
        const ref = state.data.references[state.hero];
        const path = `${MODEL_ROOT}/${state.hero.replace("hero", "")}/input/face.png`;
        for (const [view, cell] of Object.entries(ref.views)) {
          const tile = document.createElement("button");
          tile.className = `thumb ${view === state.view ? "active" : ""}`;
          tile.type = "button";
          const x =
            ref.grid.columns <= 1
              ? 50
              : (cell.column / (ref.grid.columns - 1)) * 100;
          const y =
            ref.grid.rows <= 1 ? 50 : (cell.row / (ref.grid.rows - 1)) * 100;
          tile.innerHTML = `<div class="crop" style="background-image:url('${path}');background-size:${ref.grid.columns * 100}% ${ref.grid.rows * 100}%;background-position:${x}% ${y}%"></div><span>${view}</span>`;
          tile.addEventListener("click", () => {
            if (viewCamera[view]) setView(view);
          });
          strip.appendChild(tile);
        }
      };
      const animate = () => {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };
      const resize = () => {
        const w = canvas.clientWidth || 1;
        const h = canvas.clientHeight || 1;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      window.addEventListener("resize", resize);
      presetSelect.addEventListener("change", () => assignPreset(presetSelect.value));
      heroSelect.addEventListener("change", updateReference);
      overlayOpacity.addEventListener("input", updateReference);
      window.__faceEditor = {
        setPreset: assignPreset,
        setValues: (obj) => {
          Object.assign(state.values, obj);
          refreshSliders();
          rebuild();
        },
        setView,
        setOverlay: (value) => {
          overlayOpacity.value = String(value);
          updateReference();
        },
        setCutaway,
        metrics: () => ({ ...state.metrics }),
        debugNodes: () =>
          featureGroup.children.map((child) => ({
            name: child.name,
            position: [child.position.x, child.position.y, child.position.z],
          })),
        state,
      };

      const boot = async () => {
        const data = await fetch(DATA_URL).then((r) => r.json());
        state.data = data;
        buildControls();
        assignPreset("neutral");
        setView("front");
        setCutaway("none");
        resize();
        animate();
      };
      boot().catch((error) => {
        cycleStatus.textContent = `failed to load head-model.json: ${error.message}`;
        throw error;
      });
    </script>
  </body>
</html>
