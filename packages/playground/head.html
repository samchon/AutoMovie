<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>automovie face editor</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

      const DATA_URL = "/models/head-model.json";
      const MODEL_ROOT = "/@fs/D:/github/samchon/motica/.models/hero";
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const mix = (a, b, t) => a + (b - a) * t;
      const smooth = (x) => {
        const t = clamp(x, 0, 1);
        return t * t * (3 - 2 * t);
      };
      const gaussian = (x, center, width) => {
        const d = (x - center) / width;
        return Math.exp(-d * d);
      };
      const pretty = (text) =>
        text.replace(/([A-Z])/g, " $1").replace(/^./, (s) => s.toUpperCase());
      const viewCamera = {
        front: [0, 0.03, 5.4],
        frontClose: [0, 0.02, 3.65],
        rightThreeQuarter: [3.3, 0.03, 4.2],
        rightThreeQuarterClose: [2.35, 0.03, 3.35],
        rightProfile: [5.4, 0.03, 0],
        rightProfileClose: [3.65, 0.03, 0],
        rightSocketClose: [2.1, 0.5, 2.65],
        top: [0, 5.6, 0.01],
        bottom: [0, -5.6, 0.01],
        back: [0, 0.03, -5.4],
        backRightThreeQuarter: [2.75, 0.03, -3.35],
        backLeftThreeQuarter: [-2.75, 0.03, -3.35],
        leftThreeQuarter: [-3.3, 0.03, 4.2],
        leftThreeQuarterClose: [-2.35, 0.03, 3.35],
        leftSocketClose: [-2.1, 0.5, 2.65],
        leftProfile: [-5.4, 0.03, 0],
        leftProfileClose: [-3.65, 0.03, 0],
        eyeClose: [0, 0.11, 2.25],
      };
      const baselineMetrics = {
        facialIndex: 1.36,
        jawToZygoma: 0.69,
        chinToZygoma: 0.36,
        eyeWidthToFace: 0.22,
        eyeAperture: 0.32,
        eyeSpacingToWidth: 1.08,
        browEyeDistance: 0.88,
        noseWidthToFace: 0.225,
        noseLengthToFace: 0.315,
        mouthWidthToFace: 0.345,
        lowerUpperLip: 1.18,
        chinHeightToFace: 0.18,
        profileDepthToFace: 0.72,
        tipProjectionToFace: 0.18,
      };

      const app = document.querySelector("#app");
      app.innerHTML = `
        <style>
          * { box-sizing: border-box; }
          html, body, #app { width: 100%; height: 100%; }
          body {
            margin: 0;
            font: 12px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #dfe4ec;
            background: #101216;
          }
          button, select, input { font: inherit; }
          #stage {
            display: grid;
            grid-template-columns: minmax(520px, 1fr) 390px;
            height: 100vh;
            min-height: 620px;
          }
          #workbench {
            display: grid;
            grid-template-rows: minmax(0, 1fr) 190px;
            min-width: 0;
            background: #151922;
          }
          #viewport {
            position: relative;
            min-width: 0;
            min-height: 0;
          }
          #view {
            width: 100%;
            height: 100%;
            display: block;
            background: #171b23;
          }
          #reference {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            background-size: contain;
          }
          #hud {
            position: absolute;
            left: 14px;
            top: 14px;
            display: grid;
            gap: 8px;
            width: min(560px, calc(100% - 28px));
          }
          .hud-line {
            width: fit-content;
            max-width: 100%;
            padding: 6px 8px;
            border: 1px solid rgba(220, 226, 235, 0.18);
            border-radius: 6px;
            background: rgba(15, 17, 22, 0.74);
            color: #dbe2ed;
            font-size: 11px;
            backdrop-filter: blur(8px);
          }
          #strip {
            display: grid;
            grid-template-columns: repeat(5, minmax(112px, 1fr));
            gap: 6px;
            padding: 8px;
            border-top: 1px solid #2b303a;
            background: #101216;
            overflow: hidden;
          }
          .thumb {
            position: relative;
            min-width: 0;
            border: 1px solid #2b303a;
            border-radius: 6px;
            overflow: hidden;
            background: #0d0f13;
            cursor: pointer;
          }
          .thumb.active { border-color: #c99a56; }
          .thumb .crop {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
          }
          .thumb span {
            position: absolute;
            left: 6px;
            bottom: 5px;
            padding: 2px 5px;
            border-radius: 4px;
            background: rgba(8, 9, 12, 0.76);
            color: #f2f4f7;
            font-size: 10px;
          }
          #panel {
            min-width: 0;
            overflow-y: auto;
            border-left: 1px solid #2b303a;
            background: #12151b;
          }
          #panelHeader {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 14px;
            border-bottom: 1px solid #2b303a;
            background: rgba(18, 21, 27, 0.96);
          }
          h1 {
            margin: 0 0 3px;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: 0;
          }
          .sub {
            color: #9aa4b5;
            font-size: 11px;
          }
          #panelBody {
            padding: 12px 14px 20px;
          }
          h2 {
            margin: 15px 0 8px;
            color: #aab4c5;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
          }
          .toolbar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
          }
          button, select {
            min-height: 30px;
            border: 1px solid #303744;
            border-radius: 6px;
            background: #1b202a;
            color: #e7ebf2;
          }
          button {
            cursor: pointer;
          }
          button.active {
            border-color: #c99a56;
            background: #2a2218;
            color: #ffe2b8;
          }
          select {
            width: 100%;
            padding: 4px 7px;
          }
          .row {
            margin: 8px 0;
          }
          .row label {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
          }
          .row label span:first-child {
            overflow-wrap: anywhere;
          }
          .value {
            color: #abb6c8;
            font-variant-numeric: tabular-nums;
          }
          input[type="range"] {
            width: 100%;
            accent-color: #c99a56;
          }
          #metrics {
            display: grid;
            gap: 4px;
          }
          .metric {
            display: grid;
            grid-template-columns: minmax(92px, 1fr) 56px 56px 56px;
            gap: 6px;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #222832;
            font-variant-numeric: tabular-nums;
          }
          .metric.header {
            color: #8f9bad;
            font-size: 10px;
            text-transform: uppercase;
          }
          .metric .err.ok { color: #8fd69c; }
          .metric .err.warn { color: #f3c46f; }
          .metric .err.bad { color: #f08b81; }
          #paramGroups details {
            border-top: 1px solid #242a35;
            padding-top: 7px;
          }
          #paramGroups summary {
            cursor: pointer;
            color: #c3cad6;
            font-weight: 650;
          }
          #cycleLog {
            min-height: 76px;
            padding: 8px;
            border: 1px solid #29303b;
            border-radius: 6px;
            background: #0e1116;
            color: #aab4c5;
            white-space: pre-wrap;
          }
          @media (max-width: 900px) {
            #stage { grid-template-columns: 1fr; grid-template-rows: 60vh auto; height: auto; min-height: 100vh; }
            #workbench { grid-template-rows: minmax(360px, 60vh) 150px; }
            #panel { border-left: 0; border-top: 1px solid #2b303a; }
          }
        </style>
        <div id="stage">
          <main id="workbench">
            <section id="viewport">
              <canvas id="view"></canvas>
              <div id="reference"></div>
              <div id="hud">
                <div class="hud-line" id="cycleStatus">Change one parameter, measure, analyze, adjust. No unmeasured completion claim.</div>
                <div class="hud-line" id="viewStatus">front · render only</div>
              </div>
            </section>
            <section id="strip"></section>
          </main>
          <aside id="panel">
            <div id="panelHeader">
              <h1>Face Editor</h1>
              <div class="sub">Universal parameters. Heroes are numeric presets.</div>
            </div>
            <div id="panelBody">
              <h2>Preset</h2>
              <select id="preset"></select>
              <h2>View</h2>
              <div class="toolbar" id="views"></div>
              <h2>Reference</h2>
              <div class="row">
                <label><span>hero sheet</span><span class="value" id="heroLabel">off</span></label>
                <select id="hero"></select>
              </div>
              <div class="row">
                <label><span>overlay opacity</span><span class="value" id="overlayValue">0.00</span></label>
                <input id="overlayOpacity" type="range" min="0" max="1" step="0.01" value="0" />
              </div>
              <h2>Measurement</h2>
              <div id="metrics"></div>
              <h2>Adjustment Cycle</h2>
              <div id="cycleLog"></div>
              <h2>Parameters</h2>
              <div id="paramGroups"></div>
            </div>
          </aside>
        </div>
      `;

      const canvas = document.querySelector("#view");
      const reference = document.querySelector("#reference");
      const presetSelect = document.querySelector("#preset");
      const heroSelect = document.querySelector("#hero");
      const overlayOpacity = document.querySelector("#overlayOpacity");
      const overlayValue = document.querySelector("#overlayValue");
      const heroLabel = document.querySelector("#heroLabel");
      const metricsEl = document.querySelector("#metrics");
      const paramGroupsEl = document.querySelector("#paramGroups");
      const strip = document.querySelector("#strip");
      const viewButtons = document.querySelector("#views");
      const cycleLog = document.querySelector("#cycleLog");
      const cycleStatus = document.querySelector("#cycleStatus");
      const viewStatus = document.querySelector("#viewStatus");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x171b23);
      // Soft studio-portrait lighting to match the reference photos' conditions
      // (large softbox + fill): a gentle key/fill ratio (~1.3:1) with strong
      // hemisphere ambient so the form reads without harsh directional shadows
      // carving phantom planes/hollows. Comparison fairness > dramatic modeling.
      scene.add(new THREE.HemisphereLight(0xdfe6f2, 0x3a2a22, 1.25));
      const key = new THREE.DirectionalLight(0xfff4e0, 0.58);
      key.position.set(0.9, 1.5, 2.7);
      scene.add(key);
      const side = new THREE.DirectionalLight(0xcdd9ff, 0.34);
      side.position.set(-1.8, 1.4, 1.8);
      scene.add(side);
      const rim = new THREE.DirectionalLight(0xffffff, 0.3);
      rim.position.set(-1.4, 1.5, -2.0);
      scene.add(rim);

      const camera = new THREE.PerspectiveCamera(24, 1, 0.05, 20);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      const controls = new OrbitControls(camera, canvas);
      controls.target.set(0, 0.02, 0);
      controls.enableDamping = true;

      const root = new THREE.Group();
      scene.add(root);
      const clay = new THREE.MeshStandardMaterial({
        color: 0xd8b7a3,
        roughness: 0.7,
        metalness: 0,
      });
      const featureMat = new THREE.MeshStandardMaterial({
        color: 0x9f6a66,
        roughness: 0.8,
        metalness: 0,
      });
      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf0ece6, roughness: 0.55 });
      const irisMat = new THREE.MeshStandardMaterial({ color: 0x3b2920, roughness: 0.35 });
      const browMat = new THREE.MeshStandardMaterial({ color: 0x251d19, roughness: 0.88 });
      const hairMat = new THREE.MeshStandardMaterial({ color: 0x161210, roughness: 0.92, metalness: 0, side: THREE.DoubleSide });
      const eyeTex = new THREE.TextureLoader().load(
        "/@fs/D:/github/samchon/motica/.references/makehuman/makehuman/data/eyes/materials/brown_eye.png",
      );
      eyeTex.colorSpace = THREE.SRGBColorSpace;
      // The eyeball seats recessed in the socket, so scene light barely reaches
      // the cornea and the brown iris darkens to a muddy red. A low self-emissive
      // of the same texture keeps the iris its true mid-brown in socket shadow.
      const eyeballMat = new THREE.MeshStandardMaterial({
        map: eyeTex,
        emissiveMap: eyeTex,
        emissive: 0xffffff,
        // Low emissive (0.72 made the brown iris GLOW bright red like a demon
        // bead); just enough to lift the iris out of socket shadow. Higher
        // roughness kills the glassy highlight that read as a googly bead.
        emissiveIntensity: 0.2,
        roughness: 0.55,
        metalness: 0,
      });
      const metricMat = new THREE.LineBasicMaterial({ color: 0xf3c46f, transparent: true, opacity: 0.7 });
      const managedMaterials = new Set([clay, featureMat, whiteMat, irisMat, browMat, hairMat, eyeballMat, metricMat]);
      let cutawayPlanes = [];
      const applyCutawayToMaterial = (material) => {
        material.clippingPlanes = cutawayPlanes;
        material.clipIntersection = false;
        material.needsUpdate = true;
      };
      const setCutawayPlanes = (planes) => {
        cutawayPlanes = planes;
        renderer.localClippingEnabled = planes.length > 0;
        for (const material of managedMaterials) applyCutawayToMaterial(material);
      };
      const registerMaterial = (material) => {
        managedMaterials.add(material);
        applyCutawayToMaterial(material);
        return material;
      };
      setCutawayPlanes([]);

      const headGeometry = new THREE.BufferGeometry();
      const headMesh = new THREE.Mesh(headGeometry, clay);
      headMesh.castShadow = true;
      headMesh.receiveShadow = true;
      root.add(headMesh);
      const hairGeometry = new THREE.BufferGeometry();
      const hairMesh = new THREE.Mesh(hairGeometry, hairMat);
      hairMesh.visible = false;
      root.add(hairMesh);
      const hairBackGeometry = new THREE.BufferGeometry();
      const hairBackMesh = new THREE.Mesh(hairBackGeometry, hairMat);
      hairBackMesh.visible = false;
      root.add(hairBackMesh);
      const eyeballGeometry = new THREE.BufferGeometry();
      const eyeballMesh = new THREE.Mesh(eyeballGeometry, eyeballMat);
      eyeballMesh.visible = false;
      root.add(eyeballMesh);
      const metricsGroup = new THREE.Group();
      // Hidden by default — the yellow measurement guide lines should not pollute
      // renders / future MediaPipe passes. (__faceEditor can toggle if needed.)
      metricsGroup.visible = false;
      root.add(metricsGroup);
      const featureGroup = new THREE.Group();
      root.add(featureGroup);

      const state = {
        data: null,
        values: {},
        preset: "neutral",
        hero: "",
        view: "front",
        overlay: 0,
        lastChanged: null,
        metrics: {},
        basePositions: null,
        currentPositions: null,
        cutaway: "none",
      };

      const get = (id) => Number(state.values[id] ?? 0);
      const get01 = (id, scale = 1) => clamp(get(id) / scale, -1, 1);
      const assignPreset = (name) => {
        state.preset = name;
        state.values = {};
        const preset = state.data.presets[name];
        for (const p of state.data.parameters) state.values[p.id] = p.default ?? 0;
        for (const [id, value] of Object.entries(preset.values ?? {})) state.values[id] = value;
        state.hero = name.startsWith("hero") ? name : "";
        presetSelect.value = name;
        heroSelect.value = state.hero;
        heroLabel.textContent = state.hero || "off";
        updateReference();
        refreshSliders();
        rebuild();
        applyHair(name);
      };
      const readParameters = () => {
        const p = {};
        for (const item of state.data.parameters) p[item.id] = get(item.id);
        return {
          p,
          cranialW: 1 + get("headWidth") * 0.055 + get("cephalicIndex") * 0.035,
          cranialH: 1 + get("headHeight") * 0.05 + get("foreheadHeight") * 0.025,
          cranialD: 1 + get("headDepth") * 0.07 - get("cephalicIndex") * 0.03,
          faceLen: 1 + get("faceLength") * 0.07,
          zygomaW: 1 + get("bizygomaticWidth") * 0.055,
          jawW: 1 + get("jawWidth") * 0.07 - get("jawTaper") * 0.04,
          chinW: 1 + get("chinWidth") * 0.08 - get("jawTaper") * 0.04,
          eyeScale: 1 + get("eyeScale") * 0.07,
          eyeWidth: 1 + get("eyeWidth") * 0.1 + get("eyeScale") * 0.035,
          eyeHeight: 1 + get("eyeHeight") * 0.14 + get("eyeScale") * 0.025,
          eyeSpacing: get("eyeSpacing") * 0.028,
          noseW: 1 + get("alarWidth") * 0.09 + get("tipWidth") * 0.025,
          noseLen: 1 + get("noseLength") * 0.08,
          mouthW: 1 + get("mouthWidth") * 0.12,
          upperLip: 1 + get("upperLipHeight") * 0.15 + get("upperLipFullness") * 0.05,
          lowerLip: 1 + get("lowerLipHeight") * 0.15 + get("lowerLipFullness") * 0.05,
        };
      };
      const headPoint = (u, v, c) => {
        const phi = u * Math.PI * 2;
        const y = Math.cos(v * Math.PI);
        const ring = Math.sin(v * Math.PI);
        const front = Math.cos(phi);
        const side = Math.sin(phi);
        const isFront = Math.max(0, front);
        const lower = smooth((-y + 0.12) / 0.76);
        const upper = smooth((y + 0.1) / 0.78);
        const mid = gaussian(y, 0.0, 0.52);
        const jawBand = gaussian(y, -0.5, 0.22);
        const chinBand = gaussian(y, -0.78, 0.18);
        const cheekBand = gaussian(y, -0.05 - get("cheekboneHeight") * 0.025, 0.22);
        const templeBand = gaussian(y, 0.28, 0.26);
        let halfW =
          0.47 *
          ring *
          c.cranialW *
          (1 + get("templeWidth") * 0.035 * templeBand + get("cheekFullness") * 0.028 * cheekBand);
        halfW *=
          1 +
          isFront * cheekBand * (c.zygomaW - 1 + get("cheekboneProjection") * 0.02) +
          isFront * jawBand * (c.jawW - 1) +
          isFront * chinBand * (c.chinW - 1);
        const chinTuck = isFront * chinBand * (0.08 + get("chinRoundness") * 0.02);
        const yFace = y * 0.78 * c.cranialH * (1 + (lower - 0.4) * (c.faceLen - 1));
        let z =
          front *
          0.45 *
          ring *
          c.cranialD *
          (1 + get("occiputDepth") * 0.03 * Math.max(0, -front) + get("foreheadBulge") * 0.025 * upper);
        z += isFront * (0.076 * mid + get("cheekFullness") * 0.022 * cheekBand);
        z += isFront * get("chinProjection") * 0.036 * chinBand;
        z -= isFront * get("jawAngle") * 0.018 * jawBand;
        z += isFront * get("foreheadSlope") * 0.03 * upper * (0.3 + y);
        return new THREE.Vector3(side * halfW * (1 - chinTuck), yFace - 0.03, z);
      };
      const ensureHeadMesh = () => {
        if (state.basePositions !== null) return;
        state.basePositions = new Float32Array(state.data.mesh.positions);
        state.currentPositions = new Float32Array(state.basePositions.length);
        headGeometry.setIndex(state.data.mesh.indices);
        headGeometry.setAttribute(
          "position",
          new THREE.BufferAttribute(state.currentPositions, 3),
        );
        if (state.data.hair?.positions?.length) {
          hairGeometry.setAttribute(
            "position",
            new THREE.BufferAttribute(new Float32Array(state.data.hair.positions), 3),
          );
          hairMesh.visible = true;
        }
        if (state.data.hairBacking?.positions?.length) {
          hairBackGeometry.setIndex(state.data.hairBacking.indices);
          hairBackGeometry.setAttribute(
            "position",
            new THREE.BufferAttribute(new Float32Array(state.data.hairBacking.positions), 3),
          );
          hairBackGeometry.computeVertexNormals();
          hairBackMesh.visible = true;
        }
        if (state.data.eyeballs?.positions?.length) {
          // Keep the pristine baked positions: the eyeball mesh is static, but
          // each preset's lids move (eyeSpacing/height/depth), so on every
          // rebuild we re-seat the eyeballs onto the live lid centres. Without
          // this the eyeball and lids diverge and the cornea pokes past the lid
          // as a crescent for presets whose eyeSpacing differs from the bake.
          state.eyeballBase = new Float32Array(state.data.eyeballs.positions);
          eyeballGeometry.setAttribute(
            "position",
            new THREE.BufferAttribute(new Float32Array(state.data.eyeballs.positions), 3),
          );
          eyeballGeometry.setAttribute(
            "uv",
            new THREE.BufferAttribute(new Float32Array(state.data.eyeballs.uvs), 2),
          );
          eyeballGeometry.computeVertexNormals();
          eyeballMesh.visible = true;
        }
        // Dark scalp cap under the coarse hair proxy: fills the crown/part gaps
        // so they read as parting and shadow instead of bald skin.
        {
          const bp = state.basePositions;
          let mnx = 1e9, mxx = -1e9, mxy = -1e9, mnz = 1e9, mxz = -1e9;
          for (let i = 0; i < bp.length; i += 3) {
            const x = bp[i], y = bp[i + 1], z = bp[i + 2];
            if (y < 0.4) continue;
            if (x < mnx) mnx = x;
            if (x > mxx) mxx = x;
            if (y > mxy) mxy = y;
            if (z < mnz) mnz = z;
            if (z > mxz) mxz = z;
          }
          const hairlineY = mxy - (mxy - 0.4) * 0.6;
          const cap = new THREE.Mesh(
            new THREE.SphereGeometry(1, 40, 22, 0, Math.PI * 2, 0, Math.PI * 0.62),
            hairMat,
          );
          // Wide enough in x to overlap the hair backing at the crown (closes the
          // specks) but shallow in z and height so it hugs the skull — the
          // reference hair is sleek/pulled-back, not a bouffant dome. An oversized
          // z made the crown bulge front-to-back in profile.
          cap.scale.set((mxx - mnx) * 0.6, (mxy - hairlineY) * 1.06, (mxz - mnz) * 0.58);
          cap.position.set((mnx + mxx) / 2, hairlineY, (mnz + mxz) / 2 - 0.02);
          root.add(cap);
        }
      };
      const collectBounds = (positions, predicate) => {
        const bounds = {
          min: [Infinity, Infinity, Infinity],
          max: [-Infinity, -Infinity, -Infinity],
          count: 0,
        };
        for (let i = 0; i < positions.length; i += 3) {
          const x = positions[i];
          const y = positions[i + 1];
          const z = positions[i + 2];
          if (!predicate(x, y, z)) continue;
          bounds.count += 1;
          bounds.min[0] = Math.min(bounds.min[0], x);
          bounds.min[1] = Math.min(bounds.min[1], y);
          bounds.min[2] = Math.min(bounds.min[2], z);
          bounds.max[0] = Math.max(bounds.max[0], x);
          bounds.max[1] = Math.max(bounds.max[1], y);
          bounds.max[2] = Math.max(bounds.max[2], z);
        }
        return bounds;
      };
      const range = (bounds, axis) => bounds.max[axis] - bounds.min[axis];
      const applySparseMorph = (positions, rows, weight) => {

        return [];

      const setCutaway = (mode) => {
        state.cutaway = mode;
        setCutawayPlanes(makeCutawayPlanes(mode));
      };
      const updateReference = () => {
        state.hero = heroSelect.value;
        heroLabel.textContent = state.hero || "off";
        const opacity = Number(overlayOpacity.value);
        state.overlay = opacity;
        overlayValue.textContent = opacity.toFixed(2);
        reference.style.opacity = state.hero ? String(opacity) : "0";
        if (state.hero) {
          const ref = state.data.references[state.hero];
          const cell = ref.views[state.view] ?? ref.views.front;
          const x =
            ref.grid.columns <= 1
              ? 50
              : (cell.column / (ref.grid.columns - 1)) * 100;
          const y =
            ref.grid.rows <= 1 ? 50 : (cell.row / (ref.grid.rows - 1)) * 100;
          reference.style.backgroundImage = `url("${MODEL_ROOT}/${state.hero.replace("hero", "")}/input/face.png")`;
          reference.style.backgroundSize = `${ref.grid.columns * 100}% ${ref.grid.rows * 100}%`;
          reference.style.backgroundPosition = `${x}% ${y}%`;
        } else {
          reference.style.backgroundImage = "";
        }
        renderStrip();
        viewStatus.textContent = `${pretty(state.view)} · ${state.hero ? state.data.references[state.hero].name : "render only"}`;
        renderMetrics();
        renderCycleLog();
      };
      const renderStrip = () => {
        strip.innerHTML = "";
        if (!state.hero) return;
        const ref = state.data.references[state.hero];
        const path = `${MODEL_ROOT}/${state.hero.replace("hero", "")}/input/face.png`;
        for (const [view, cell] of Object.entries(ref.views)) {
          const tile = document.createElement("button");
          tile.className = `thumb ${view === state.view ? "active" : ""}`;
          tile.type = "button";
          const x =
            ref.grid.columns <= 1
              ? 50
              : (cell.column / (ref.grid.columns - 1)) * 100;
          const y =
            ref.grid.rows <= 1 ? 50 : (cell.row / (ref.grid.rows - 1)) * 100;
          tile.innerHTML = `<div class="crop" style="background-image:url('${path}');background-size:${ref.grid.columns * 100}% ${ref.grid.rows * 100}%;background-position:${x}% ${y}%"></div><span>${view}</span>`;
          tile.addEventListener("click", () => {
            if (viewCamera[view]) setView(view);
          });
          strip.appendChild(tile);
        }
      };
      const animate = () => {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };
      const resize = () => {
        const w = canvas.clientWidth || 1;
        const h = canvas.clientHeight || 1;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      };
      window.addEventListener("resize", resize);
      presetSelect.addEventListener("change", () => assignPreset(presetSelect.value));
      heroSelect.addEventListener("change", updateReference);
      overlayOpacity.addEventListener("input", updateReference);
      window.__faceEditor = {
        setPreset: assignPreset,
        setValues: (obj) => {
          Object.assign(state.values, obj);
          refreshSliders();
          rebuild();
        },
        setView,
        setCameraYaw: (deg) => {
          const r = 5.4;
          const th = (deg * Math.PI) / 180;
          camera.position.set(r * Math.sin(th), 0.03, 0.02 + r * Math.cos(th));
          camera.up.set(0, 1, 0);
          controls.target.set(0, 0, 0.02);
          controls.update();
        },
        setOverlay: (value) => {
          overlayOpacity.value = String(value);
          updateReference();
        },
        setCutaway,
        metrics: () => ({ ...state.metrics }),
        debugNodes: () =>
          featureGroup.children.map((child) => ({
            name: child.name,
            position: [child.position.x, child.position.y, child.position.z],
          })),
        state,
      };

      const boot = async () => {
        const data = await fetch(DATA_URL).then((r) => r.json());
        state.data = data;
        buildControls();
        assignPreset("neutral");
        setView("front");
        setCutaway("none");
        resize();
        animate();
      };
      boot().catch((error) => {
        cycleStatus.textContent = `failed to load head-model.json: ${error.message}`;
        throw error;
      });
    </script>
  </body>
</html>
